<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Hamling Tech</title>
    <link rel="stylesheet" href="css/style.css?v=1">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<body>
    <header class="site-header">
        <a href="index.html?v=1" class="logo">Hamling Tech</a>
        <button class="burger" aria-label="Menu" aria-expanded="false" aria-controls="nav-menu">&#9776;</button>
        <nav id="nav-menu">
            <ul class="nav-links">
                <li class="home-link"><a href="index.html?v=1">Home</a></li>
                <li><a href="booking.html?v=1">Booking</a></li>
                <li><a class="current" href="contact.html?v=1">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2 class="center-text">Contact Us</h2>
            <form id="contact-form">
                <label for="contact-name">Name:</label>
                <input type="text" id="contact-name" name="name" required>

                <label for="contact-phone">Phone:</label>
                <input type="tel" id="contact-phone" name="phone" required>

                <label for="contact-email">Email:</label>
                <input type="email" id="contact-email" name="email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="4" required></textarea>

                <button class="btn" type="submit">Send</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="contact-info">
            <p id="copy-email" class="email">service@hamlingtech.com</p>
            <p id="copy-phone" class="phone">(203) 430-8851</p>
        </div>
        <p>&copy; 2026 Hamling Tech</p>
    </footer>

    <script src="js/script.js?v=1"></script>
</body>
</html>
