<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - IT Express</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="logo">IT Express</a>
        <button class="burger" aria-label="Menu" aria-expanded="false" aria-controls="nav-menu">&#9776;</button>
        <nav id="nav-menu">
            <ul class="nav-links">
                <li class="home-link"><a href="index.html">Home</a></li>
                <li><a class="current" href="booking.html">Booking</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2 class="center-text">Book an Appointment</h2>
            <form id="booking-form">
                <label for="service">Service Needed:</label>
                <select id="service" name="service" required>
                    <option value="repair">Repair</option>
                    <option value="diagnose">Diagnose</option>
                    <option value="build">Custom Build</option>
                    <option value="upgrade">OS Upgrade</option>
                </select>

                <label for="description">Problem Description:</label>
                <textarea id="description" name="description" rows="4" required></textarea>

                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone" required>

                <label for="booking-email">Email:</label>
                <input type="email" id="booking-email" name="email" required>

                <button class="btn" type="submit">Submit</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="contact-info">
            <p id="copy-email" class="email">service@it-express.org</p>
            <p id="copy-phone" class="phone">(555) 123-4567</p>
        </div>
        <p>&copy; 2025 IT Express</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
