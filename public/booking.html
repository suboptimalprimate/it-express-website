<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - IT Express</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="logo">IT Express</a>
        <button class="burger" aria-label="Menu" aria-expanded="false" aria-controls="nav-menu">&#9776;</button>
        <nav id="nav-menu">
            <ul class="nav-links">
                <li class="home-link"><a href="index.html">Home</a></li>
                <li><a href="booking.html">Booking</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Book an Appointment</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="booking-email">Email:</label>
                <input type="email" id="booking-email" name="email" required>

                <label for="date">Preferred Date:</label>
                <input type="date" id="date" name="date" required>

                <button type="submit">Submit</button>
            </form>
        </section>
    </main>

    <footer>
        <p id="copy-email" class="email">service@it-express.org</p>
        <p>&copy; 2024 IT Express</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
